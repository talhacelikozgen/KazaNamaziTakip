<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huma Kaza Takip & Analiz</title>
    <style>
        :root { --primary: #00adb5; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #00ffd4; --warning: #ff9800; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background-color: var(--card); padding: 20px; border-radius: 15px; width: 100%; max-width: 700px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }
        .section { background: #252525; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        h3 { font-size: 0.9em; color: #888; margin-top: 0; margin-bottom: 10px; text-transform: uppercase; }
        
        /* Analiz Izgarası */
        .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .analysis-box { background: #0f1a1a; border-left: 3px solid var(--primary); padding: 12px; border-radius: 6px; color: var(--accent); font-size: 0.85em; line-height: 1.5; }
        .full-width { grid-column: 1 / -1; border-left-color: var(--warning); background: #1a160f; }

        /* Durum Kartları */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; }
        .stat-card { background: #2d2d2d; padding: 12px; border-radius: 10px; text-align: center; border-bottom: 2px solid var(--primary); }
        .stat-card h4 { margin: 0; font-size: 0.75em; color: #888; }
        .stat-card p { margin: 8px 0; font-size: 1em; font-weight: bold; }
        
        .progress-bar { height: 5px; background: #111; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        
        /* Form ve Butonlar */
        .form-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input, select { background: #333; color: white; border: 1px solid #444; padding: 12px; border-radius: 8px; outline: none; font-size: 1em; }
        .btn-add { background: var(--primary); color: white; width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1em; }
        .btn-add:hover { background: #008f95; filter: brightness(1.2); }
        
        .footer-btns { display: flex; gap: 8px; margin-top: 10px; }
        .btn-util { background: #3a3a3a; color: #eee; font-size: 0.75em; flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #444; cursor: pointer; transition: 0.2s; }
        .btn-util:hover { background: #4a4a4a; }
        
        textarea { width: 100%; height: 80px; background: #000; color: var(--accent); border: 1px solid #444; border-radius: 8px; padding: 10px; font-family: 'Courier New', monospace; font-size: 11px; margin-top: 10px; display: none; resize: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Huma Kaza Takip</h2>

    <div class="section">
        <h3>⚙️ Kişisel Hedef Ayarı</h3>
        <div style="display: flex; align-items: center; gap: 15px;">
            <label style="font-size: 0.9em;">Toplam Borç (Gün):</label>
            <input type="number" id="hedefInput" style="width: 100px;" onchange="hedefGuncelle()" placeholder="Örn: 2200">
        </div>
    </div>

    <div class="section">
        <h3>📊 Detaylı Analiz & Tahmini Bitiş</h3>
        <div class="analysis-grid" id="analizGrid"></div>
    </div>

    <div class="section">
        <h3>📈 İlerleme Durumu</h3>
        <div id="stats" class="stat-grid"></div>
    </div>

    <div class="section">
        <h3>📥 Namaz Ekle</h3>
        <div class="form-group">
            <select id="vakit" style="flex: 2;">
                <option value="Sabah">Sabah</option><option value="Öğle">Öğle</option>
                <option value="İkindi">İkindi</option><option value="Akşam">Akşam</option>
                <option value="Yatsı">Yatsı</option><option value="Vitir">Vitir</option>
            </select>
            <input type="number" id="miktar" value="1" min="1" style="flex: 1;">
        </div>
        <button class="btn-add" onclick="ekle()">Kılınan Namazı İşle</button>
    </div>

    <div class="section" style="border-top: 2px solid var(--primary);">
        <h3>🛡️ Veri Güvenliği & Yedekleme</h3>
        <div class="footer-btns">
            <button class="btn-util" onclick="jsonIndir()">💾 Dosya İndir</button>
            <button class="btn-util" onclick="veriKopyala()">📋 Metin Kopyala</button>
            <button class="btn-util" onclick="togglePaste()">📥 Veri Yükle</button>
        </div>
        <textarea id="transferArea" placeholder="Yedeklediğiniz metni buraya yapıştırın..."></textarea>
        <button id="yukleBtn" class="btn-util" style="display:none; width:100%; margin-top:8px; background:var(--primary); color:white;" onclick="veriYukle()">Sistemi Güncelle</button>
        <center><button onclick="sifirla()" style="background:transparent; color:#555; border:none; cursor:pointer; font-size:0.7em; margin-top:15px; text-decoration:underline;">Tüm Verileri Sıfırla</button></center>
    </div>
</div>

<script>
    // Kullanıcı ilk defa açıyorsa varsayılan değerler
    let data = JSON.parse(localStorage.getItem('humaKazaDeposu')) || {
        kayitlar: { Sabah: 0, Öğle: 0, İkindi: 0, Akşam: 0, Yatsı: 0, Vitir: 0 },
        baslangicTarihi: new Date().getTime(),
        toplamHedefGun: 0 // Herkes kendi değerini girsin diye 0 başlattık
    };

    function arayuzGuncelle() {
        const statsDiv = document.getElementById('stats');
        const analizGrid = document.getElementById('analizGrid');
        document.getElementById('hedefInput').value = data.toplamHedefGun || "";
        
        statsDiv.innerHTML = '';
        analizGrid.innerHTML = '';
        
        const H = data.toplamHedefGun || 1; // 0'a bölünme hatası olmasın
        const gecenGun = Math.max(Math.ceil((new Date().getTime() - data.baslangicTarihi) / 86400000), 1);
        let toplamKilinan = 0;

        for (let v in data.kayitlar) {
            let k = data.kayitlar[v];
            toplamKilinan += k;
            let p = Math.min((k / H) * 100, 100);
            
            // Kart Çizimi
            statsDiv.innerHTML += `
                <div class="stat-card">
                    <h4>${v}</h4>
                    <p>${k}/${H}</p>
                    <div class="progress-bar"><div class="progress-fill" style="width:${data.toplamHedefGun > 0 ? p : 0}%"></div></div>
                </div>`;
            
            // Vakit Analizi
            let vHiz = k / gecenGun;
            let box = `<div class="analysis-box"><strong>${v}:</strong><br>`;
            if (k > 0 && data.toplamHedefGun > 0) {
                let vKalanGun = Math.ceil((H - k) / vHiz);
                let vBitis = new Date(); vBitis.setDate(vBitis.getDate() + vKalanGun);
                box += `Hız: ${vHiz.toFixed(2)} gün/gün<br>Bitiş: ${vBitis.toLocaleDateString('tr-TR')}`;
            } else { box += `Veri bekleniyor...`; }
            analizGrid.innerHTML += box + `</div>`;
        }

        // Genel Analiz
        let gHiz = (toplamKilinan / 6) / gecenGun;
        let gKalan = (toplamKilinan > 0 && data.toplamHedefGun > 0) ? Math.ceil(((H * 6) - toplamKilinan) / (toplamKilinan / gecenGun)) : 0;
        let gBitis = new Date(); gBitis.setDate(gBitis.getDate() + gKalan);

        analizGrid.insertAdjacentHTML('afterbegin', `
            <div class="analysis-box full-width">
                <strong>🌍 GENEL DURUM:</strong><br>
                Ortalama Hız: <b>${gHiz.toFixed(2)}</b> tam gün | Kalan: <b>${gKalan}</b> gün | Hedef Bitiş: <b>${toplamKilinan > 0 ? gBitis.toLocaleDateString('tr-TR') : '---'}</b>
            </div>
        `);

        // OTOMATİK KAYIT
        localStorage.setItem('humaKazaDeposu', JSON.stringify(data));
    }

    function ekle() {
        if (data.toplamHedefGun <= 0) { alert("Lütfen önce toplam hedef gün sayısını girin!"); return; }
        const v = document.getElementById('vakit').value;
        const m = parseInt(document.getElementById('miktar').value);
        if (m > 0) { data.kayitlar[v] += m; arayuzGuncelle(); }
    }

    function hedefGuncelle() {
        const val = parseInt(document.getElementById('hedefInput').value);
        data.toplamHedefGun = val > 0 ? val : 0;
        arayuzGuncelle();
    }

    function jsonIndir() {
        const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `huma_kaza_yedek.json`;
        a.click();
    }

    function veriKopyala() {
        navigator.clipboard.writeText(JSON.stringify(data)).then(() => alert("Tüm veriler metin olarak kopyalandı!"));
    }

    function togglePaste() {
        const area = document.getElementById('transferArea');
        const btn = document.getElementById('yukleBtn');
        const isHidden = area.style.display === 'none' || area.style.display === '';
        area.style.display = isHidden ? 'block' : 'none';
        btn.style.display = isHidden ? 'block' : 'none';
    }

    function veriYukle() {
        try {
            const raw = document.getElementById('transferArea').value;
            const yuklenen = JSON.parse(raw);
            if(yuklenen.kayitlar) {
                data = yuklenen;
                arayuzGuncelle();
                alert("Veriler başarıyla yüklendi!");
                togglePaste();
            }
        } catch(e) { alert("Hatalı veri formatı!"); }
    }

    function sifirla() {
        if(confirm("Tüm ilerlemeniz SİLİNECEK. Emin misiniz?")) {
            localStorage.removeItem('humaKazaDeposu');
            location.reload();
        }
    }

    arayuzGuncelle();
</script>
</body>
</html>
